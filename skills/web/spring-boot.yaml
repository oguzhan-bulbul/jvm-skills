name: Spring Boot Skill
description: >-
  Version-aware guidance for Spring Boot development: detects the project's
  Spring Boot and Java versions, applies version-specific patterns
  (Boot 3.5.x vs 4.0.x), enables virtual threads on Java 21+, configures
  JSpecify/NullAway null safety, sets up observability (OpenAPI, Micrometer,
  distributed tracing), writes JavaDocs and JUnit tests for every change,
  and verifies APIs against current upstream documentation.
